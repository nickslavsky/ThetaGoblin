{% extends "screener/base.html" %}

{% block title %}ThetaGoblin — CSP Candidates{% endblock %}

{% block content %}
<div class="header-bar">
    <div>
        <h1 style="margin:0;">ThetaGoblin</h1>
        <small id="candidate-count">CSP Candidates — loading…</small>
    </div>
    <div>
        <button id="refresh-btn" class="secondary" style="margin:0;">&#8635; Refresh</button>
    </div>
</div>

<div id="spinner" aria-busy="true" style="text-align:center; padding:2rem;">
    Scanning options chains…
</div>

<div id="candidates-container"></div>

<div id="no-candidates" class="no-candidates" style="display:none;">
    <h2>No candidates found</h2>
    <p>Check your FilterConfig thresholds or try again later.</p>
    <p><a href="/admin/screener/filterconfig/">Edit FilterConfig</a></p>
</div>

<script>
(function() {
    var container = document.getElementById('candidates-container');
    var spinner = document.getElementById('spinner');
    var countEl = document.getElementById('candidate-count');
    var noResults = document.getElementById('no-candidates');
    var refreshBtn = document.getElementById('refresh-btn');
    var evtSource = null;

    function startStream() {
        container.innerHTML = '';
        spinner.style.display = '';
        noResults.style.display = 'none';
        countEl.textContent = 'CSP Candidates \u2014 loading\u2026';
        refreshBtn.disabled = true;

        if (evtSource) {
            evtSource.close();
        }

        evtSource = new EventSource('{% url "candidates_stream" %}');

        evtSource.addEventListener('candidate', function(e) {
            container.insertAdjacentHTML('beforeend', e.data);
        });

        evtSource.addEventListener('done', function(e) {
            var count = parseInt(e.data, 10);
            spinner.style.display = 'none';
            refreshBtn.disabled = false;
            var suffix = count === 1 ? '' : 's';
            countEl.textContent = 'CSP Candidates \u2014 ' + count + ' ticker' + suffix;
            if (count === 0) {
                noResults.style.display = '';
            }
            evtSource.close();
            evtSource = null;
        });

        evtSource.addEventListener('error', function() {
            spinner.style.display = 'none';
            refreshBtn.disabled = false;
            if (evtSource) {
                evtSource.close();
                evtSource = null;
            }
        });
    }

    // Suppress: event delegation on container (cards are added dynamically)
    container.addEventListener('click', function(e) {
        var cell = e.target.closest('.expiry-cell');
        if (!cell) return;

        var card = cell.closest('.candidate-card');
        var symbolId = card.dataset.symbolId;
        var suppressUntil = cell.dataset.expiry;

        fetch('{% url "suppress_symbol" %}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}',
            },
            body: JSON.stringify({
                symbol_id: parseInt(symbolId),
                suppress_until: suppressUntil,
            }),
        }).then(function(resp) {
            if (resp.ok) {
                card.remove();
                var remaining = container.querySelectorAll('.candidate-card').length;
                var suffix = remaining === 1 ? '' : 's';
                countEl.textContent = 'CSP Candidates \u2014 ' + remaining + ' ticker' + suffix;
            }
        });
    });

    refreshBtn.addEventListener('click', startStream);

    startStream();
})();
</script>
{% endblock %}
